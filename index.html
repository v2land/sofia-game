<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.O.F.I.A. — Strategic Decision Game by @Vlad8Mir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--g:#00ff88;--g2:#00cc66;--g3:#003d1f;--bg:#050f09;--bg2:#091a0f;--bg3:#0d2414;--txt:#c8ffd8;--txt2:#6bcc99;--txt3:#2d6644;--border:#1a3d25;--border2:#2a6644;--danger:#ff4455;--gold:#ffd700;--font:'Share Tech Mono',monospace;--font-h:'Orbitron',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.012) 2px,rgba(0,255,136,.012) 4px);pointer-events:none;z-index:9999}
.app{max-width:660px;margin:0 auto;padding:1.25rem 1rem 4rem}
.screen{display:none}.screen.active{display:block}
.lang-bar{display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap}
.lb{padding:3px 12px;font-family:var(--font);font-size:11px;border:1px solid var(--border);border-radius:2px;cursor:pointer;background:transparent;color:var(--txt3);letter-spacing:2px;transition:all .15s}
.lb:hover{border-color:var(--g2);color:var(--g2)}.lb.active{background:var(--g3);border-color:var(--g);color:var(--g);font-weight:700}
.nav-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.nt{flex:1;padding:.5rem;font-family:var(--font);font-size:11px;letter-spacing:1px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--txt3);cursor:pointer;transition:all .15s;text-align:center}
.nt:hover{color:var(--txt2)}.nt.active{color:var(--g);border-bottom-color:var(--g)}
.logo{font-family:var(--font-h);font-size:clamp(22px,7vw,38px);font-weight:900;color:var(--g);letter-spacing:6px;text-shadow:0 0 25px rgba(0,255,136,.35);line-height:1;margin-bottom:3px}
.logo-sub{font-size:10px;color:var(--txt3);letter-spacing:3px;margin-bottom:1.25rem}
.vtag{font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:1.5rem}
.sofia-grid{border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:1.25rem}
.sr{display:flex;align-items:baseline;gap:10px;padding:.45rem .85rem;border-bottom:1px solid var(--border);transition:background .15s}
.sr:last-child{border-bottom:none}.sr:hover{background:var(--bg2)}
.sl{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--g);min-width:20px}
.sw{font-size:12px;font-weight:700;color:var(--txt);min-width:95px;letter-spacing:1px}
.sd{font-size:11px;color:var(--txt2)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.25rem}
.sb-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:.6rem;text-align:center}
.sb-n{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--g)}
.sb-l{font-size:9px;color:var(--txt3);letter-spacing:2px;margin-top:2px}
.badges-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.badge{display:flex;flex-direction:column;align-items:center;gap:3px;padding:.5rem .6rem;border:1px solid var(--border);border-radius:3px;min-width:60px;transition:all .2s}
.badge.unlocked{border-color:var(--g2);background:var(--g3)}.badge.locked{opacity:.35}
.badge-icon{font-size:18px}.badge-name{font-size:9px;color:var(--txt2);letter-spacing:1px;text-align:center}
.challenge-box{border:1px solid var(--gold);border-radius:3px;padding:.75rem 1rem;margin-bottom:1.25rem;cursor:pointer;transition:background .15s}
.challenge-box:hover{background:rgba(255,215,0,.05)}
.chal-title{font-size:10px;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.chal-text{font-size:13px;color:var(--txt);line-height:1.5}
.sec-lbl{font-size:10px;color:var(--txt3);letter-spacing:3px;margin-bottom:.65rem}
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:1.25rem}
.dc{padding:.5rem .75rem;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:11px;color:var(--txt2);letter-spacing:1px;text-align:center;transition:all .15s}
.dc:hover{border-color:var(--g2);color:var(--g)}.dc.sel{border-color:var(--g);color:var(--g);background:var(--g3)}
.btn{width:100%;padding:.7rem 1rem;background:transparent;border:1px solid var(--border2);border-radius:2px;font-family:var(--font);font-size:13px;color:var(--g);cursor:pointer;letter-spacing:2px;transition:all .15s;display:block;text-align:center;margin-top:7px;text-decoration:none}
.btn:hover{background:var(--g3);border-color:var(--g);text-shadow:0 0 8px var(--g)}.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-gold{border-color:var(--gold);color:var(--gold)}.btn-gold:hover{background:rgba(255,215,0,.08)}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-row{display:flex;gap:7px;margin-top:7px}.btn-row .btn{margin-top:0}
.btn-sm{padding:.4rem .75rem;font-size:11px;letter-spacing:1px}
.domain-tag{display:inline-block;font-size:10px;padding:2px 10px;border:1px solid var(--border2);border-radius:2px;color:var(--g2);letter-spacing:2px;margin-bottom:.65rem}
.sc-num{font-size:10px;color:var(--txt3);letter-spacing:2px;margin-bottom:.4rem}
.sc-box{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:.9rem 1rem;margin-bottom:1.1rem;font-size:14px;line-height:1.8;color:var(--txt)}
.progress-bar{display:flex;gap:5px;margin-bottom:1.1rem}
.ps{flex:1;height:3px;border-radius:1px;background:var(--bg3);transition:background .3s}
.ps.done{background:var(--g)}.ps.cur{background:var(--g2)}
.step-hd{font-family:var(--font-h);font-size:13px;color:var(--g);margin-bottom:2px;letter-spacing:2px}
.step-q{font-size:11px;color:var(--txt2);margin-bottom:.8rem;letter-spacing:1px}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:1.1rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:.7rem .85rem;background:var(--bg);border:1px solid var(--border);border-radius:2px;cursor:pointer;text-align:left;font-family:var(--font);font-size:13px;color:var(--txt2);transition:all .15s;line-height:1.5;width:100%}
.opt:hover{border-color:var(--g2);color:var(--txt);background:var(--bg2)}.opt.sel{border-color:var(--g);color:var(--g);background:var(--g3)}
.opt-k{font-family:var(--font-h);font-size:11px;font-weight:700;color:var(--txt3);min-width:16px;margin-top:1px}.opt.sel .opt-k{color:var(--g2)}
.score-n{font-family:var(--font-h);font-size:clamp(40px,10vw,60px);font-weight:900;color:var(--g);text-shadow:0 0 30px rgba(0,255,136,.4);line-height:1;margin:.4rem 0 3px}
.score-lv{font-size:10px;color:var(--txt2);letter-spacing:3px;margin-bottom:1.1rem}
.analysis{display:flex;flex-direction:column;gap:5px;margin-bottom:1.1rem}
.ar{display:flex;align-items:flex-start;gap:8px;padding:.55rem .85rem;background:var(--bg2);border-radius:2px;font-size:12px}
.al{font-family:var(--font-h);font-size:11px;font-weight:700;min-width:14px;padding-top:1px}
.al.ok{color:var(--g)}.al.bad{color:var(--danger)}
.at{flex:1;color:var(--txt2);line-height:1.5}
.ap{font-family:var(--font-h);font-size:11px;white-space:nowrap}
.ap.ok{color:var(--g)}.ap.bad{color:var(--danger)}
.insight{border-left:2px solid var(--g3);padding:.7rem .9rem;margin-bottom:1.1rem;font-size:13px;color:var(--txt2);line-height:1.7;background:var(--bg2);border-radius:0 3px 3px 0}
.new-bdg{border:1px solid var(--gold);border-radius:3px;padding:.6rem .9rem;margin-bottom:1.1rem;background:rgba(255,215,0,.05)}
.new-bdg-t{font-size:9px;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.new-bdg-c{font-size:13px;color:var(--txt)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.1rem}
.sc2{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:.75rem;text-align:center}
.sc2-n{font-family:var(--font-h);font-size:20px;font-weight:700;color:var(--g)}
.sc2-l{font-size:9px;color:var(--txt3);letter-spacing:2px;margin-top:3px}
.dom-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dom-n{font-size:11px;color:var(--txt2);min-width:115px;letter-spacing:1px}
.dom-bg{flex:1;height:3px;background:var(--bg3);border-radius:1px}
.dom-fill{height:3px;border-radius:1px;background:var(--g);transition:width .6s}
.dom-pct{font-size:11px;color:var(--txt3);min-width:28px;text-align:right}
.ct-hd{font-family:var(--font-h);font-size:16px;color:var(--g);letter-spacing:3px;margin-bottom:.4rem}
.ct-sub{font-size:11px;color:var(--txt2);margin-bottom:1.25rem;line-height:1.6}
.sp-box{border:1px dashed var(--gold);border-radius:3px;padding:1rem;margin-bottom:1.25rem;text-align:center}
.sp-title{font-size:9px;color:var(--gold);letter-spacing:3px;margin-bottom:.5rem}
.sp-desc{font-size:12px;color:var(--txt2);margin-bottom:.75rem;line-height:1.7;white-space:pre-line}
.sp-price{font-family:var(--font-h);font-size:18px;color:var(--gold);margin-bottom:.65rem}
.ct-links{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}
.cl{display:flex;align-items:center;gap:10px;padding:.6rem .85rem;border:1px solid var(--border);border-radius:2px;text-decoration:none;color:var(--txt2);font-size:12px;letter-spacing:1px;transition:all .15s}
.cl:hover{border-color:var(--g2);color:var(--g);background:var(--bg2)}
.cl-ic{font-size:16px;min-width:22px;text-align:center}
.sh-links{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.sh-btn{display:flex;align-items:center;gap:10px;padding:.55rem .85rem;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--txt2);background:transparent;transition:all .15s;letter-spacing:1px;width:100%}
.sh-btn:hover{border-color:var(--g2);color:var(--g);background:var(--bg2)}
.sh-ic{font-size:15px;min-width:20px}
.copyright{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);font-size:10px;color:var(--txt3);line-height:1.9;white-space:pre-line}
.copyright a{color:var(--txt3);text-decoration:none}.copyright a:hover{color:var(--g2)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--g);color:var(--g);font-family:var(--font);font-size:12px;padding:.55rem 1.1rem;border-radius:2px;z-index:10000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;letter-spacing:1px}
.toast.show{opacity:1}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s step-end infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.screen.active{animation:fadeIn .2s ease}
@media(max-width:480px){.domain-grid{grid-template-columns:repeat(2,1fr)}.btn-row{flex-wrap:wrap}.btn-row .btn{flex:1;min-width:120px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
<div class="lang-bar">
  <button class="lb active" onclick="setLang('fr')">FR</button>
  <button class="lb" onclick="setLang('en')">EN</button>
  <button class="lb" onclick="setLang('ro')">RO</button>
  <button class="lb" onclick="setLang('ru')">RU</button>
  <button class="lb" onclick="setLang('it')">IT</button>
</div>
<div class="nav-tabs">
  <button class="nt active" id="tab-home" onclick="showTab('home')">⬡ JEU</button>
  <button class="nt" id="tab-stats" onclick="showTab('stats')">◈ STATS</button>
  <button class="nt" id="tab-contact" onclick="showTab('contact')">✉ CONTACT</button>
</div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="logo">S.O.F.I.A<span class="blink">_</span></div>
  <div class="logo-sub" id="h-sub"></div>
  <div class="vtag">v4.0 · MIT Open Source · © Vladimir Casapciuc / Владимир Касапчук</div>
  <div class="sofia-grid" id="h-sofia"></div>
  <div class="stats-bar">
    <div class="sb-card"><div class="sb-n" id="qs-streak">0🔥</div><div class="sb-l" id="qs-sl"></div></div>
    <div class="sb-card"><div class="sb-n" id="qs-played">0</div><div class="sb-l" id="qs-pl"></div></div>
    <div class="sb-card"><div class="sb-n" id="qs-best">—</div><div class="sb-l" id="qs-bl"></div></div>
  </div>
  <div class="sec-lbl" id="h-bdg-lbl"></div>
  <div class="badges-row" id="h-badges"></div>
  <div class="challenge-box" onclick="startChallenge()">
    <div class="chal-title" id="h-chal-title"></div>
    <div class="chal-text" id="h-chal-text"></div>
  </div>
  <div class="sec-lbl" id="h-dom-lbl"></div>
  <div class="domain-grid" id="h-domains"></div>
  <button class="btn" id="h-btn-play" onclick="startGame()"></button>
  <button class="btn btn-gold" id="h-btn-rand" onclick="startRandom()"></button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div id="g-tag" class="domain-tag"></div>
  <div id="g-num" class="sc-num"></div>
  <div id="g-text" class="sc-box"></div>
  <div class="progress-bar" id="g-prog"></div>
  <div id="g-shd" class="step-hd"></div>
  <div id="g-sq" class="step-q"></div>
  <div class="opts" id="g-opts"></div>
  <button class="btn" id="g-next" onclick="nextStep()" disabled></button>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="sec-lbl" id="r-lbl"></div>
  <div class="score-n" id="r-score"></div>
  <div class="score-lv" id="r-lv"></div>
  <div class="analysis" id="r-an"></div>
  <div class="insight" id="r-ins"></div>
  <div class="new-bdg" id="r-bdg" style="display:none">
    <div class="new-bdg-t" id="r-bdg-t"></div>
    <div class="new-bdg-c" id="r-bdg-c"></div>
  </div>
  <div class="sec-lbl" id="r-sh-lbl"></div>
  <div class="sh-links" id="r-sh"></div>
  <div class="btn-row">
    <button class="btn" id="r-next" onclick="nextScenario()"></button>
    <button class="btn" id="r-home" onclick="goHome()"></button>
  </div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div class="sec-lbl" id="st-lbl"></div>
  <div class="stats-grid">
    <div class="sc2"><div class="sc2-n" id="st-p">0</div><div class="sc2-l" id="st-pl"></div></div>
    <div class="sc2"><div class="sc2-n" id="st-a">—</div><div class="sc2-l" id="st-al"></div></div>
    <div class="sc2"><div class="sc2-n" id="st-b">—</div><div class="sc2-l" id="st-bl"></div></div>
  </div>
  <div class="sec-lbl" id="st-dlbl"></div>
  <div id="st-doms" style="margin-bottom:1.1rem"></div>
  <div class="sec-lbl" id="st-blbl"></div>
  <div class="badges-row" id="st-badges"></div>
  <button class="btn btn-danger btn-sm" id="st-reset" onclick="resetStats()" style="margin-top:1rem"></button>
</div>

<!-- CONTACT -->
<div id="screen-contact" class="screen">
  <div class="ct-hd" id="ct-title"></div>
  <div class="ct-sub" id="ct-sub"></div>
  <div class="sp-box">
    <div class="sp-title" id="ct-sp-t"></div>
    <div class="sp-desc" id="ct-sp-d"></div>
    <div class="sp-price" id="ct-sp-p"></div>
    <a href="mailto:v2land@gmail.com" class="btn btn-gold btn-sm" style="display:inline-block;width:auto;padding:.4rem 1.4rem" id="ct-sp-cta"></a>
  </div>
  <div class="sec-lbl" id="ct-ll"></div>
  <div class="ct-links">
    <a href="mailto:v2land@gmail.com" class="cl"><span class="cl-ic">📧</span>v2land@gmail.com</a>
    <a href="https://x.com/Vlad8Mir" target="_blank" class="cl"><span class="cl-ic">𝕏</span>@Vlad8Mir — x.com/Vlad8Mir</a>
    <a href="https://www.facebook.com/v2land/" target="_blank" class="cl"><span class="cl-ic">📘</span>facebook.com/v2land</a>
  </div>
  <div class="sec-lbl" id="ct-dt"></div>
  <a href="https://ko-fi.com/v2land" target="_blank" class="btn btn-gold">☕ Ko-fi — ko-fi.com/v2land</a>
  <a href="https://paypal.me/VladimirCasapciuc" target="_blank" class="btn">$ PayPal — paypal.me/VladimirCasapciuc</a>
  <div class="sec-lbl" style="margin-top:1.25rem" id="ct-shl"></div>
  <div class="sh-links">
    <button class="sh-btn" onclick="shareGame('twitter')"><span class="sh-ic">𝕏</span><span id="ct-sx"></span></button>
    <button class="sh-btn" onclick="shareGame('facebook')"><span class="sh-ic">📘</span><span id="ct-sfb"></span></button>
    <button class="sh-btn" onclick="shareGame('copy')"><span class="sh-ic">🔗</span><span id="ct-sc"></span></button>
  </div>
  <div class="copyright" id="ct-copy"></div>
</div>
</div>

ru:'Ребёнок не лжёт против тебя — пытается справиться с ситуацией которая превышает его возможности. Твоя реакция определяет придут ли к тебе в следующий раз.',
it:'Il bambino non mente contro di te — cerca di gestire una situazione che lo sopraffà. La tua reazione determina se verrà da te la prossima volta.'})
];

// ══ STATE ══════════════════════════════════════════════════════
let lang='fr',selDom=null,curSc=null,curStep=0,ans={},lastScore=0,lastLv='',isChallenge=false;
let G={scores:[],domains:{},badges:[],streak:0,lastDay:null};
try{const d=localStorage.getItem('sofia4');if(d)G=Object.assign(G,JSON.parse(d));}catch(e){}
function save(){try{localStorage.setItem('sofia4',JSON.stringify(G));}catch(e){}}
function t(k){return TX[lang][k]||'';}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function doms(){return[...new Set(SC.map(x=>x.domain[lang]))];}
function pool(){return selDom?SC.filter(x=>x.domain[lang]===selDom):SC;}
function seed(){const d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function seededR(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function dailySc(){return SC[Math.floor(seededR(seed())*SC.length)];}
function updateStreak(){
  const today=new Date().toDateString();
  if(G.lastDay===today)return;
  const yest=new Date(Date.now()-86400000).toDateString();
  G.streak=G.lastDay===yest?(G.streak||0)+1:1;
  G.lastDay=today;save();
}
function checkBadges(score){
  const earned=[];
  const add=(id)=>{if(!G.badges.includes(id)){G.badges.push(id);earned.push(id);}};
  if(G.scores.length>=1)add('first');
  if(score>=80)add('s80');
  if(score>=100)add('s100');
  if((G.streak||0)>=3)add('str3');
  if(doms().every(d=>G.domains[d]))add('all');
  save();return earned;
}

// ══ LANG ══════════════════════════════════════════════════════
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  renderHome();
  const active=document.querySelector('.screen.active')?.id?.split('-')[1];
  if(active==='stats')renderStats();
  else if(active==='contact')renderContact();
  // update tab labels
  const tabs=['tab-home','tab-stats','tab-contact'];
  const tkeys=['tabs'];
  tabs.forEach((id,i)=>{document.getElementById(id).textContent=TX[lang].tabs[i];});
}

// ══ TAB NAV ════════════════════════════════════════════════════
function showTab(tab){
  document.querySelectorAll('.nt').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='home'){showScreen('home');renderHome();}
  else if(tab==='stats'){showScreen('stats');renderStats();}
  else if(tab==='contact'){showScreen('contact');renderContact();}
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function goHome(){showTab('home');}

// ══ HOME ══════════════════════════════════════════════════════
function renderHome(){
  // Tab labels
  ['home','stats','contact'].forEach((k,i)=>{document.getElementById('tab-'+k).textContent=TX[lang].tabs[i];});
  document.getElementById('h-sub').textContent=t('sub');
  // Sofia grid
  document.getElementById('h-sofia').innerHTML=TX[lang].sofia.map(([l,w,d])=>`<div class="sr"><span class="sl">${l}</span><span class="sw">${w}</span><span class="sd">${d}</span></div>`).join('');
  // Quick stats
  const n=G.scores.length;
  document.getElementById('qs-streak').textContent=(G.streak||0)+'🔥';
  document.getElementById('qs-played').textContent=n;
  document.getElementById('qs-best').textContent=n?Math.max(...G.scores):'—';
  document.getElementById('qs-sl').textContent=t('streak');
  document.getElementById('qs-pl').textContent=t('played');
  document.getElementById('qs-bl').textContent=t('best');
  // Badges
  document.getElementById('h-bdg-lbl').textContent=t('bdgLbl');
  renderBadges('h-badges');
  // Daily challenge
  document.getElementById('h-chal-title').textContent=t('chalTitle');
  const ds=dailySc();
  document.getElementById('h-chal-text').textContent=ds.text[lang].substring(0,90)+'…';
  // Domain
  document.getElementById('h-dom-lbl').textContent=t('domLbl');
  const dg=document.getElementById('h-domains');
  const dl=doms();
  dg.innerHTML=`<div class="dc${!selDom?' sel':''}" onclick="selDomain(null)">${t('domAll')}</div>`
    +dl.map(d=>`<div class="dc${selDom===d?' sel':''}" onclick="selDomain('${d}')">${d}</div>`).join('');
  document.getElementById('h-btn-play').textContent=t('btnPlay');
  document.getElementById('h-btn-rand').textContent=t('btnRand');
}
function selDomain(d){selDom=d;renderHome();}
function renderBadges(cid){
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML=TX[lang].bdgs.map(b=>`<div class="badge ${G.badges.includes(b.id)?'unlocked':'locked'}" title="${b.desc}"><div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div></div>`).join('');
}

// ══ GAME ══════════════════════════════════════════════════════
function startGame(){const p=pool();curSc=p[Math.floor(Math.random()*p.length)];isChallenge=false;launch();}
function startRandom(){curSc=SC[Math.floor(Math.random()*SC.length)];isChallenge=false;launch();}
function startChallenge(){curSc=dailySc();isChallenge=true;launch();}
function launch(){curStep=0;ans={};renderGame();showScreen('game');}
function renderGame(){
  const sc=curSc,sk=L[curStep],sd=sc.steps[sk];
  document.getElementById('g-tag').textContent=(isChallenge?'⚡ ':'')+sc.domain[lang];
  document.getElementById('g-num').textContent=t('scOf')+' '+sc.id+' · '+t('stOf')+' '+(curStep+1)+'/5';
  document.getElementById('g-text').textContent=sc.text[lang];
  document.getElementById('g-prog').innerHTML=L.map((_,i)=>`<div class="ps${i<curStep?' done':i===curStep?' cur':''}"></div>`).join('');
  document.getElementById('g-shd').textContent=sk+' — '+TX[lang].sn[sk].toUpperCase();
  document.getElementById('g-sq').textContent=sd.q[lang];
  document.getElementById('g-opts').innerHTML=sd.opts[lang].map((o,i)=>`<button class="opt${ans[sk]===i?' sel':''}" onclick="selOpt(${i})"><span class="opt-k">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`).join('');
  document.getElementById('g-next').textContent=t('btnNext');
  document.getElementById('g-next').disabled=ans[sk]===undefined;
}
function selOpt(i){const k=L[curStep];ans[k]=i;document.querySelectorAll('.opt').forEach((b,idx)=>b.classList.toggle('sel',idx===i));document.getElementById('g-next').disabled=false;}
function nextStep(){if(curStep<4){curStep++;renderGame();}else showResult();}

// ══ RESULT ════════════════════════════════════════════════════
function showResult(){
  const sc=curSc;let total=0;
  document.getElementById('r-lbl').textContent=t('rLbl');
  const an=document.getElementById('r-an');an.innerHTML='';
  L.forEach(k=>{
    const corr=sc.steps[k].c,ua=ans[k],pts=ua===corr?20:0;total+=pts;
    const ok=pts===20;
    an.innerHTML+=`<div class="ar"><span class="al ${ok?'ok':'bad'}">${k}</span><span class="at">${sc.steps[k].an[lang][ua]||''}</span><span class="ap ${ok?'ok':'bad'}">${ok?'+20':'+0'}</span></div>`;
  });
  lastScore=total;
  const lvi=total<40?0:total<60?1:total<80?2:total<100?3:4;
  lastLv=TX[lang].lvs[lvi];
  document.getElementById('r-score').textContent=total+'/100';
  document.getElementById('r-lv').textContent=lastLv;
  document.getElementById('r-ins').textContent=sc.insight[lang];
  G.scores.push(total);if(G.scores.length>200)G.scores=G.scores.slice(-200);
  const dom=sc.domain[lang];if(!G.domains[dom])G.domains[dom]=[];G.domains[dom].push(total);
  updateStreak();
  const nb=checkBadges(total);
  const rb=document.getElementById('r-bdg'),rbc=document.getElementById('r-bdg-c');
  const rbt=document.getElementById('r-bdg-t');
  if(nb.length>0){rb.style.display='block';rbt.textContent=t('newBdg');const bd=TX[lang].bdgs.filter(b=>nb.includes(b.id));rbc.textContent=bd.map(b=>b.icon+' '+b.name).join(' · ');}
  else rb.style.display='none';
  document.getElementById('r-sh-lbl').textContent=t('shLbl');
  document.getElementById('r-sh').innerHTML=`
    <button class="sh-btn" onclick="shareResult('twitter')"><span class="sh-ic">𝕏</span><span>${t('shareX')}</span></button>
    <button class="sh-btn" onclick="shareResult('facebook')"><span class="sh-ic">📘</span><span>${t('shareFB')}</span></button>
    <button class="sh-btn" onclick="shareResult('copy')"><span class="sh-ic">🔗</span><span>${t('shareCopy')}</span></button>`;
  document.getElementById('r-next').textContent=t('btnNextSc');
  document.getElementById('r-home').textContent=t('btnHome');
  // update quick stats on home too
  const n=G.scores.length;
  document.getElementById('qs-streak').textContent=(G.streak||0)+'🔥';
  document.getElementById('qs-played').textContent=n;
  document.getElementById('qs-best').textContent=Math.max(...G.scores);
  showScreen('result');
}
function nextScenario(){
  const p=pool();let n;do{n=p[Math.floor(Math.random()*p.length)];}while(n.id===curSc.id&&p.length>1);
  curSc=n;curStep=0;ans={};renderGame();showScreen('game');
}

// ══ STATS ════════════════════════════════════════════════════
function renderStats(){
  document.getElementById('st-lbl').textContent=t('stLbl');
  const n=G.scores.length,avg=n?Math.round(G.scores.reduce((a,b)=>a+b,0)/n):0;
  document.getElementById('st-p').textContent=n;
  document.getElementById('st-a').textContent=n?avg:'—';
  document.getElementById('st-b').textContent=n?Math.max(...G.scores):'—';
  document.getElementById('st-pl').textContent=t('played');
  document.getElementById('st-al').textContent=t('avg');
  document.getElementById('st-bl').textContent=t('best');
  document.getElementById('st-dlbl').textContent=t('domByLbl');
  document.getElementById('st-blbl').textContent=t('bdgLbl');
  document.getElementById('st-reset').textContent=t('btnReset');
  const dp=document.getElementById('st-doms');
  const dl=Object.keys(G.domains);
  if(!dl.length){dp.innerHTML=`<div style="font-size:11px;color:var(--txt3);letter-spacing:1px">${t('noStats')}</div>`;}
  else{dp.innerHTML=dl.map(d=>{const a=G.domains[d],p=Math.round(a.reduce((x,y)=>x+y,0)/a.length);return`<div class="dom-row"><span class="dom-n">${d}</span><div class="dom-bg"><div class="dom-fill" style="width:${p}%"></div></div><span class="dom-pct">${p}%</span></div>`;}).join('');}
  renderBadges('st-badges');
}
function resetStats(){
  if(!confirm('Reset all stats?'))return;
  G={scores:[],domains:{},badges:[],streak:0,lastDay:null};save();
  renderStats();renderHome();toast(t('resetDone'));
}

// ══ CONTACT ══════════════════════════════════════════════════
function renderContact(){
  document.getElementById('ct-title').textContent=t('ctTitle');
  document.getElementById('ct-sub').textContent=t('ctSub');
  document.getElementById('ct-sp-t').textContent=t('spT');
  document.getElementById('ct-sp-d').textContent=t('spD');
  document.getElementById('ct-sp-p').textContent=t('spP');
  document.getElementById('ct-sp-cta').textContent=t('spCta');
  document.getElementById('ct-ll').textContent=t('llbl');
  document.getElementById('ct-dt').textContent=t('dtlbl');
  document.getElementById('ct-shl').textContent=t('shlbl');
  document.getElementById('ct-sx').textContent=t('shareX');
  document.getElementById('ct-sfb').textContent=t('shareFB');
  document.getElementById('ct-sc').textContent=t('shareCopy');
  document.getElementById('ct-copy').textContent=t('copy');
}

// ══ SHARE ════════════════════════════════════════════════════
function shareResult(type){doShare(type,TX[lang].smsg(lastScore,lastLv));}
function shareGame(type){doShare(type,TX[lang].sgmsg);}
function doShare(type,msg){
  if(type==='twitter')window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(msg),'_blank');
  else if(type==='facebook')window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent('https://x.com/Vlad8Mir')+'&quote='+encodeURIComponent(msg),'_blank');
  else{try{navigator.clipboard.writeText(msg).then(()=>toast(t('copied'))).catch(()=>toast(t('copied')));}catch(e){toast(t('copied'));}}
}

// ══ INIT ════════════════════════════════════════════════════
renderHome();
renderContact();
</script>
